<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客编辑器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      margin-bottom: 30px;
      color: #333;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    textarea {
      min-height: 300px;
      font-family: monospace;
      resize: vertical;
    }
    button {
      background: #3b82f6;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover { background: #2563eb; }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .token-setup {
      background: #fff3cd;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      border-left: 4px solid #ffc107;
    }
    .token-setup a {
      color: #3b82f6;
      text-decoration: none;
    }
    .status {
      margin-top: 20px;
      padding: 12px;
      border-radius: 4px;
      display: none;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 博客编辑器</h1>

    <div class="token-setup" id="tokenSetup">
      <strong>首次使用设置：</strong><br>
      1. 访问 <a href="https://github.com/settings/tokens/new" target="_blank">GitHub Token 页面</a><br>
      2. 创建 token，勾选 <code>repo</code> 权限<br>
      3. 复制 token 并粘贴到下方
    </div>

    <div class="form-group">
      <label>GitHub Token（仅保存在浏览器本地）</label>
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx">
    </div>

    <div class="form-group">
      <label>标题（中文）</label>
      <input type="text" id="title" placeholder="例如：多代理并行处理">
    </div>

    <div class="form-group">
      <label>标题（英文）</label>
      <input type="text" id="titleEn" placeholder="例如：Multi-Agent Parallel Processing">
    </div>

    <div class="form-group">
      <label>分类</label>
      <input type="text" id="category" value="tech">
    </div>

    <div class="form-group">
      <label>正文（Markdown）</label>
      <textarea id="content" placeholder="在这里输入文章内容..."></textarea>
    </div>

    <button onclick="publish()" id="publishBtn">发布文章</button>

    <div class="status" id="status"></div>
  </div>

  <script>
    // 从本地存储加载 token
    const savedToken = localStorage.getItem('github_token');
    if (savedToken) {
      document.getElementById('token').value = savedToken;
      document.getElementById('tokenSetup').style.display = 'none';
    }

    async function publish() {
      const token = document.getElementById('token').value.trim();
      const title = document.getElementById('title').value.trim();
      const titleEn = document.getElementById('titleEn').value.trim();
      const category = document.getElementById('category').value.trim();
      const content = document.getElementById('content').value.trim();

      if (!token || !title || !titleEn || !content) {
        showStatus('请填写所有必填字段', 'error');
        return;
      }

      // 保存 token
      localStorage.setItem('github_token', token);
      document.getElementById('tokenSetup').style.display = 'none';

      const btn = document.getElementById('publishBtn');
      btn.disabled = true;
      btn.textContent = '发布中...';

      try {
        // 生成文件名
        const now = new Date();
        const date = now.toISOString().split('T')[0];
        const slug = titleEn.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        const filename = `${date}-${slug}.md`;

        // 生成文件内容
        const fileContent = `---
layout: post
title: '${title}'
title_en: '${titleEn}'
date: ${now.toISOString().slice(0, 19).replace('T', ' ')} +0800
categories: ${category}
---

${content}`;

        // 使用 GitHub API 创建文件
        const response = await fetch(`https://api.github.com/repos/pprp/pprp.github.io/contents/_posts/${filename}`, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message: `Add new post: ${title}`,
            content: btoa(unescape(encodeURIComponent(fileContent)))
          })
        });

        if (response.ok) {
          showStatus('✅ 文章发布成功！', 'success');
          // 清空表单
          document.getElementById('title').value = '';
          document.getElementById('titleEn').value = '';
          document.getElementById('content').value = '';
        } else {
          const error = await response.json();
          showStatus(`❌ 发布失败: ${error.message}`, 'error');
        }
      } catch (error) {
        showStatus(`❌ 发布失败: ${error.message}`, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '发布文章';
      }
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status ${type}`;
      setTimeout(() => {
        status.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
