backend:
  name: github
  repo: pprp/pprp.github.io
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "博客文章 / Blog Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "布局 / Layout", name: "layout", widget: "hidden", default: "post"}
      - {label: "标题（中文）/ Title (Chinese)", name: "title", widget: "string"}
      - {label: "标题（英文）/ Title (English)", name: "title_en", widget: "string"}
      - {label: "发布日期 / Date", name: "date", widget: "datetime"}
      - {label: "分类 / Categories", name: "categories", widget: "string", default: "tech"}
      - {label: "正文 / Body", name: "body", widget: "markdown"}
