<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">DeepSeek-V4 system stack</title>
  <desc id="desc">A left-to-right schematic matching the updated draw.io layout: input pressure flows through model architecture, stability, training, inference service, post-training, and final million-token context capabilities.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-24%" width="124%" height="148%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#059669"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .card-blue { fill: #eff6ff; stroke: #2563eb; }
      .card-white { fill: #ffffff; stroke: #2563eb; }
      .card-slate { fill: #f8fafc; stroke: #475569; }
      .card-green { fill: #ecfdf5; stroke: #059669; }
      .title { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .title-green { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #064e3b; }
      .body-green { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #065f46; }
      .caption { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .edge-blue { fill: none; stroke: #2563eb; stroke-width: 2.5; marker-end: url(#arrow-blue); }
      .edge-slate { fill: none; stroke: #64748b; stroke-width: 2.5; marker-end: url(#arrow-slate); }
      .edge-green { fill: none; stroke: #059669; stroke-width: 2.5; marker-end: url(#arrow-green); }
    </style>
  </defs>

  <rect class="bg" width="1180" height="560"/>

  <!-- Edges are drawn first to mirror draw.io layering. -->
  <path class="edge-blue" d="M250 269 H282 V129 H310"/>
  <path class="edge-blue" d="M250 269 H310"/>
  <path class="edge-blue" d="M250 269 H282 V406 H310"/>
  <path class="edge-slate" d="M540 129 H575 V186 H610"/>
  <path class="edge-slate" d="M540 268 H575 V186 H610"/>
  <path class="edge-slate" d="M540 406 H575 V386 H610"/>
  <path class="edge-green" d="M840 186 H866 V282 H890"/>
  <path class="edge-green" d="M840 386 H866 V282 H890"/>

  <g filter="url(#shadow)">
    <rect class="card-blue" x="40" y="228" width="210" height="82" rx="10" stroke-width="2"/>
    <rect class="card-white" x="310" y="70" width="230" height="118" rx="10" stroke-width="2"/>
    <rect class="card-white" x="310" y="220" width="230" height="96" rx="10" stroke-width="2"/>
    <rect class="card-white" x="310" y="350" width="230" height="112" rx="10" stroke-width="2"/>
    <rect class="card-slate" x="610" y="130" width="230" height="112" rx="10" stroke-width="2"/>
    <rect class="card-slate" x="610" y="330" width="230" height="112" rx="10" stroke-width="2"/>
    <rect class="card-green" x="890" y="234" width="230" height="96" rx="10" stroke-width="2"/>
  </g>

  <text class="title" x="62" y="258">输入压力</text>
  <text class="body" x="62" y="286">1M context + test-time scaling</text>
  <text class="body" x="62" y="306">+ long-horizon agent</text>

  <text class="title" x="332" y="102">混合注意力</text>
  <text class="body" x="332" y="130">CSA: 轻压缩 + top-k</text>
  <text class="body" x="332" y="154">HCA: 重压缩 + dense</text>
  <text class="body" x="332" y="178">SWA: 近处细节</text>

  <text class="title" x="332" y="252">深层稳定性</text>
  <text class="body" x="332" y="280">mHC residual mixing</text>
  <text class="body" x="332" y="304">Birkhoff 约束 + Sinkhorn</text>

  <text class="title" x="332" y="382">训练与低精度</text>
  <text class="body" x="332" y="410">Muon optimizer</text>
  <text class="body" x="332" y="434">FP4 QAT for experts / indexer</text>
  <text class="body" x="332" y="458">stability tricks</text>

  <text class="title" x="632" y="162">推理服务</text>
  <text class="body" x="632" y="190">heterogeneous KV cache</text>
  <text class="body" x="632" y="214">state cache + classical cache</text>
  <text class="body" x="632" y="238">on-disk prefix reuse</text>

  <text class="title" x="632" y="362">Post-training / Agent</text>
  <text class="body" x="632" y="390">specialists + OPD</text>
  <text class="body" x="632" y="414">interleaved thinking</text>
  <text class="body" x="632" y="438">Quick Instruction + tools</text>

  <text class="title-green" x="912" y="264">输出能力</text>
  <text class="body-green" x="912" y="290">更低 FLOPs / KV cache</text>
  <text class="body-green" x="912" y="312">更可部署的 1M context</text>
  <text class="body-green" x="912" y="326">更长程的 agent 任务</text>

  <text class="caption" x="535" y="501" text-anchor="middle">DeepSeek-V4 的关键不是单点优化，而是把模型、训练、推理和 agent runtime 放到同一条成本链路里。</text>
</svg>
