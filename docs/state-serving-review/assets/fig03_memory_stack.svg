<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
<defs>
<pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="#E2E8F0" stroke-width="1"/></pattern>
<marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/></marker>
<marker id="arrow-navy" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1D4ED8"/></marker>
<marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0F766E"/></marker>
<marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#B45309"/></marker>
<marker id="arrow-violet" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/></marker>
</defs>
<style>
text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
</style>
<rect width="1600" height="980" fill="#F8FAFC"/>
<rect width="1600" height="980" fill="url(#grid)" opacity="0.55"/>
<rect x="36" y="28" width="1528" height="924" rx="26" ry="26" fill="rgba(255,255,255,0.0)" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="56" y="70" font-size="32" font-weight="800" fill="#0F172A">Figure 3. A four-layer memory stack for state-centric serving</text>
<text x="56" y="102" font-size="18" font-weight="500" fill="#475569">The useful distinction is not just short-term vs long-term, but parameter memory vs live state vs external memory vs tool-ground truth</text>
<text x="140" y="142" font-size="16" font-weight="700" fill="#64748B" letter-spacing="1.2">MEMORY HIERARCHY</text>
<rect x="120" y="152" width="1120" height="640" rx="18" ry="18" fill="none" stroke="#64748B" stroke-width="2" stroke-dasharray="8 6"/>
<rect x="1320" y="214" width="210" height="108" rx="18" ry="18" fill="#FFF7ED" stroke="#B45309" stroke-width="2"/>
<rect x="1321" y="215" width="208" height="8" rx="17" ry="17" fill="#B45309"/>
<text x="1348" y="250" text-anchor="start" font-size="18" font-weight="700" fill="#0F172A">Fast / scarce</text>
<text x="1348" y="284" text-anchor="start" font-size="15" font-weight="500" fill="#475569">high-value state</text>
<text x="1348" y="307" text-anchor="start" font-size="15" font-weight="500" fill="#475569">should stay here</text>
<rect x="1320" y="690" width="210" height="108" rx="18" ry="18" fill="#F0FDFA" stroke="#0F766E" stroke-width="2"/>
<rect x="1321" y="691" width="208" height="8" rx="17" ry="17" fill="#0F766E"/>
<text x="1348" y="726" text-anchor="start" font-size="18" font-weight="700" fill="#0F172A">Slow / rich</text>
<text x="1348" y="760" text-anchor="start" font-size="15" font-weight="500" fill="#475569">store explicit</text>
<text x="1348" y="783" text-anchor="start" font-size="15" font-weight="500" fill="#475569">artifacts and fetch</text>
<text x="1348" y="806" text-anchor="start" font-size="15" font-weight="500" fill="#475569">on demand</text>
<rect x="220" y="208" width="920" height="110" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="221" y="209" width="918" height="8" rx="17" ry="17" fill="#1D4ED8"/>
<text x="248" y="244" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">Layer 1. Weights / parameter memory</text>
<text x="248" y="284" text-anchor="start" font-size="18" font-weight="500" fill="#475569">general capabilities, broad priors, model identity</text>
<text x="248" y="310" text-anchor="start" font-size="18" font-weight="500" fill="#475569">slow to update, globally shared, expensive to personalize</text>
<rect x="220" y="350" width="920" height="132" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="221" y="351" width="918" height="8" rx="17" ry="17" fill="#B45309"/>
<text x="248" y="386" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">Layer 2. Live state / active horizon</text>
<text x="248" y="426" text-anchor="start" font-size="18" font-weight="500" fill="#475569">task plan, current hypotheses, local variables, recent tool outcomes</text>
<text x="248" y="452" text-anchor="start" font-size="18" font-weight="500" fill="#475569">bounded by quality-cost trade-offs, not by the ambition to remember everything</text>
<rect x="220" y="528" width="920" height="132" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="221" y="529" width="918" height="8" rx="17" ry="17" fill="#0F766E"/>
<text x="248" y="564" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">Layer 3. External memory artifacts</text>
<text x="248" y="604" text-anchor="start" font-size="18" font-weight="500" fill="#475569">notes, AGENTS.md, memories, plans, retrieval indexes, structured summaries</text>
<text x="248" y="630" text-anchor="start" font-size="18" font-weight="500" fill="#475569">versionable, inspectable, shareable, and cheaper to persist than raw token history</text>
<rect x="220" y="706" width="920" height="110" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="221" y="707" width="918" height="8" rx="17" ry="17" fill="#7C3AED"/>
<text x="248" y="742" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">Layer 4. Tools and environment</text>
<text x="248" y="782" text-anchor="start" font-size="18" font-weight="500" fill="#475569">repo state, databases, browsers, APIs, observability, real-world systems</text>
<text x="248" y="808" text-anchor="start" font-size="18" font-weight="500" fill="#475569">final truth source when the model must verify instead of merely remember</text>
<rect x="68" y="384" width="124" height="240" rx="18" ry="18" fill="#FFF1F2" stroke="#BE123C" stroke-width="2"/>
<rect x="69" y="385" width="122" height="8" rx="17" ry="17" fill="#BE123C"/>
<text x="130.0" y="420" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">Token-preserving</text>
<text x="130.0" y="454" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">mindset</text>
<text x="130.0" y="477" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">keep as much</text>
<text x="130.0" y="500" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">history as</text>
<text x="130.0" y="523" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">possible</text>
<rect x="1180" y="384" width="132" height="240" rx="18" ry="18" fill="#F0FDFA" stroke="#0F766E" stroke-width="2"/>
<rect x="1181" y="385" width="130" height="8" rx="17" ry="17" fill="#0F766E"/>
<text x="1246.0" y="420" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">State-preserving</text>
<text x="1246.0" y="454" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">mindset</text>
<text x="1246.0" y="477" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">retain only</text>
<text x="1246.0" y="500" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">what must</text>
<text x="1246.0" y="523" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">stay live</text>
<path d="M 1140 263 L 680 263 L 680 416 L 220 416" fill="none" stroke="#1D4ED8" stroke-width="3" marker-end="url(#arrow-navy)"/>
<rect x="684" y="384" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="698" y="404" font-size="14" font-weight="600" fill="#475569">initialize</text>
<path d="M 1140 416 L 680 416 L 680 594 L 220 594" fill="none" stroke="#B45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
<rect x="684" y="562" width="121" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="698" y="582" font-size="14" font-weight="600" fill="#475569">externalize</text>
<path d="M 1140 594 L 680 594 L 680 416 L 220 416" fill="none" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow-teal)"/>
<rect x="684" y="384" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="698" y="404" font-size="14" font-weight="600" fill="#475569">retrieve</text>
<path d="M 1140 594 L 1140 594 L 1180 594 L 1180 760 L 1140 760 L 220 761" fill="none" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow-teal)"/>
<rect x="1184" y="728" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="1198" y="748" font-size="14" font-weight="600" fill="#475569">ground</text>
<path d="M 1140 761 L 1140 760 L 1260 760 L 1260 416 L 1140 416 L 220 416" fill="none" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrow-violet)"/>
<rect x="1264" y="384" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="1278" y="404" font-size="14" font-weight="600" fill="#475569">feedback</text>
<path d="M 192 504 L 180 504 L 220 504 L 220 416" fill="none" stroke="#BE123C" stroke-width="3" marker-end="url(#arrow-rose)"/>
<path d="M 1140 416 L 1140 416 L 1190 416 L 1180 504" fill="none" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow-teal)"/>
<line x1="1220" y1="860" x2="1246" y2="860" stroke="#B45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
<text x="1260" y="865" font-size="14" font-weight="600" fill="#475569">live-state retention</text>
<line x1="1220" y1="882" x2="1246" y2="882" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow-teal)"/>
<text x="1260" y="887" font-size="14" font-weight="600" fill="#475569">external memory flow</text>
<line x1="1220" y1="904" x2="1246" y2="904" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrow-violet)"/>
<text x="1260" y="909" font-size="14" font-weight="600" fill="#475569">tool-grounded correction</text>
<text x="56" y="908" font-size="15" font-weight="500" fill="#475569">This hierarchy combines systems practice (compaction, memories, AGENTS) with research on memory-operating systems.</text>
<text x="56" y="930" font-size="15" font-weight="500" fill="#475569">The active horizon H* is the operating range that stays live before external recall becomes cheaper than internal retention.</text>
</svg>
