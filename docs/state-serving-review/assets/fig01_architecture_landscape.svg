<rect x="36" y="28" width="1528" height="924" rx="26" ry="26" fill="rgba(255,255,255,0.0)" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="56" y="70" font-size="32" font-weight="800" fill="#0F172A">Figure 1. Architectural routes from long context to state-centric serving</text>
<text x="56" y="102" font-size="18" font-weight="500" fill="#475569">Observed system pressure, current open-model responses, and the hypothesized Linear-first end-state</text>
<text x="92" y="140" font-size="16" font-weight="700" fill="#64748B" letter-spacing="1.2">OBSERVED PRESSURE</text>
<rect x="72" y="150" width="1440" height="260" rx="18" ry="18" fill="none" stroke="#64748B" stroke-width="2" stroke-dasharray="8 6"/>
<text x="92" y="440" font-size="16" font-weight="700" fill="#1D4ED8" letter-spacing="1.2">COMPETING RESPONSES</text>
<rect x="72" y="450" width="1440" height="360" rx="18" ry="18" fill="none" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="8 6"/>
<rect x="120" y="194" width="360" height="164" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="121" y="195" width="358" height="8" rx="17" ry="17" fill="#B45309"/>
<text x="148" y="230" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">System bottleneck</text>
<text x="148" y="270" text-anchor="start" font-size="18" font-weight="500" fill="#475569">KV cache grows with context</text>
<text x="148" y="296" text-anchor="start" font-size="18" font-weight="500" fill="#475569">length</text>
<text x="148" y="322" text-anchor="start" font-size="18" font-weight="500" fill="#475569">prefill/decode bandwidth</text>
<text x="148" y="348" text-anchor="start" font-size="18" font-weight="500" fill="#475569">couples serving</text>
<text x="148" y="374" text-anchor="start" font-size="18" font-weight="500" fill="#475569">agent workloads turn window</text>
<text x="148" y="400" text-anchor="start" font-size="18" font-weight="500" fill="#475569">size into time-horizon cost</text>
<rect x="540" y="194" width="420" height="164" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="541" y="195" width="418" height="8" rx="17" ry="17" fill="#0F766E"/>
<text x="568" y="230" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">Market signal</text>
<text x="568" y="270" text-anchor="start" font-size="18" font-weight="500" fill="#475569">products are advertising longer</text>
<text x="568" y="296" text-anchor="start" font-size="18" font-weight="500" fill="#475569">service duration</text>
<text x="568" y="322" text-anchor="start" font-size="18" font-weight="500" fill="#475569">not just larger context windows</text>
<text x="568" y="348" text-anchor="start" font-size="18" font-weight="500" fill="#475569">planning + tool use + continuity</text>
<text x="568" y="374" text-anchor="start" font-size="18" font-weight="500" fill="#475569">matter more</text>
<rect x="1020" y="194" width="420" height="164" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="1021" y="195" width="418" height="8" rx="17" ry="17" fill="#7C3AED"/>
<text x="1048" y="230" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">Research question</text>
<text x="1048" y="270" text-anchor="start" font-size="18" font-weight="500" fill="#475569">when service length T → ∞,</text>
<text x="1048" y="296" text-anchor="start" font-size="18" font-weight="500" fill="#475569">should memory remain</text>
<text x="1048" y="322" text-anchor="start" font-size="18" font-weight="500" fill="#475569">token-addressable,</text>
<text x="1048" y="348" text-anchor="start" font-size="18" font-weight="500" fill="#475569">or become state-preserving and</text>
<text x="1048" y="374" text-anchor="start" font-size="18" font-weight="500" fill="#475569">externally recallable?</text>
<rect x="120" y="508" width="300" height="208" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="121" y="509" width="298" height="8" rx="17" ry="17" fill="#BE123C"/>
<text x="148" y="544" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">Full attention</text>
<text x="148" y="584" text-anchor="start" font-size="18" font-weight="500" fill="#475569">strong exact token</text>
<text x="148" y="610" text-anchor="start" font-size="18" font-weight="500" fill="#475569">recall</text>
<text x="148" y="636" text-anchor="start" font-size="18" font-weight="500" fill="#475569">best-understood</text>
<text x="148" y="662" text-anchor="start" font-size="18" font-weight="500" fill="#475569">infrastructure</text>
<text x="148" y="688" text-anchor="start" font-size="18" font-weight="500" fill="#475569">but memory and bandwidth</text>
<text x="148" y="714" text-anchor="start" font-size="18" font-weight="500" fill="#475569">scale with history</text>
<rect x="470" y="508" width="300" height="208" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="471" y="509" width="298" height="8" rx="17" ry="17" fill="#1D4ED8"/>
<text x="498" y="544" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">Hybrid</text>
<text x="498" y="584" text-anchor="start" font-size="18" font-weight="500" fill="#475569">Qwen3.6 / Kimi Linear /</text>
<text x="498" y="610" text-anchor="start" font-size="18" font-weight="500" fill="#475569">OLMo Hybrid</text>
<text x="498" y="636" text-anchor="start" font-size="18" font-weight="500" fill="#475569">replace most layers with</text>
<text x="498" y="662" text-anchor="start" font-size="18" font-weight="500" fill="#475569">recurrent or linear</text>
<text x="498" y="688" text-anchor="start" font-size="18" font-weight="500" fill="#475569">state</text>
<text x="498" y="714" text-anchor="start" font-size="18" font-weight="500" fill="#475569">retain attention as a</text>
<text x="498" y="740" text-anchor="start" font-size="18" font-weight="500" fill="#475569">precision backstop</text>
<rect x="820" y="508" width="300" height="208" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="821" y="509" width="298" height="8" rx="17" ry="17" fill="#0F766E"/>
<text x="848" y="544" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">Sparse / MLA / SWA</text>
<text x="848" y="584" text-anchor="start" font-size="18" font-weight="500" fill="#475569">DeepSeek-V2/V3.x / GLM /</text>
<text x="848" y="610" text-anchor="start" font-size="18" font-weight="500" fill="#475569">sliding-window stacks</text>
<text x="848" y="636" text-anchor="start" font-size="18" font-weight="500" fill="#475569">compress or localize</text>
<text x="848" y="662" text-anchor="start" font-size="18" font-weight="500" fill="#475569">attention coverage</text>
<text x="848" y="688" text-anchor="start" font-size="18" font-weight="500" fill="#475569">preserve token-level</text>
<text x="848" y="714" text-anchor="start" font-size="18" font-weight="500" fill="#475569">addressing with better</text>
<text x="848" y="740" text-anchor="start" font-size="18" font-weight="500" fill="#475569">efficiency</text>
<rect x="1170" y="508" width="300" height="208" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="1171" y="509" width="298" height="8" rx="17" ry="17" fill="#7C3AED"/>
<text x="1198" y="544" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">Linear-first agent</text>
<text x="1198" y="572" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">stack</text>
<text x="1198" y="612" text-anchor="start" font-size="18" font-weight="500" fill="#475569">bounded live state</text>
<text x="1198" y="638" text-anchor="start" font-size="18" font-weight="500" fill="#475569">retrieval-triggered</text>
<text x="1198" y="664" text-anchor="start" font-size="18" font-weight="500" fill="#475569">external recall</text>
<text x="1198" y="690" text-anchor="start" font-size="18" font-weight="500" fill="#475569">persistent memory +</text>
<text x="1198" y="716" text-anchor="start" font-size="18" font-weight="500" fill="#475569">tools + compaction</text>
<rect x="400" y="834" width="800" height="84" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="401" y="835" width="798" height="8" rx="17" ry="17" fill="#B45309"/>
<text x="800.0" y="870" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">Thesis</text>
<text x="800.0" y="904" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">The endgame of long context is not a bigger window; it is a longer, state-centric service</text>
<text x="800.0" y="927" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">horizon.</text>
<path d="M 480 276 L 300 420 L 300 460 L 120 612" fill="none" stroke="#64748B" stroke-width="3" marker-end="url(#arrow-slate)"/>
<rect x="304" y="428" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="318" y="448" font-size="14" font-weight="600" fill="#475569">baseline</text>
<path d="M 480 276 L 460 276 L 520 276 L 520 612 L 470 612" fill="none" stroke="#1D4ED8" stroke-width="3" marker-end="url(#arrow-navy)"/>
<rect x="524" y="244" width="130" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="538" y="264" font-size="14" font-weight="600" fill="#475569">reduce slope</text>
<path d="M 480 276 L 460 326 L 800 326 L 800 612 L 820 612" fill="none" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow-teal)"/>
