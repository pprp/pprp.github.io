<path d="M 960 276 L 980 276 L 1140 276 L 1140 612 L 1170 612" fill="none" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrow-violet)"/>
<rect x="1144" y="244" width="184" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="1158" y="264" font-size="14" font-weight="600" fill="#475569">time-horizon shift</text>
<path d="M 770 612 L 790 612 L 1140 612 L 1170 612" fill="none" stroke="#1D4ED8" stroke-width="3" marker-end="url(#arrow-navy)"/>
<path d="M 1120 612 L 1140 612 L 1170 612" fill="none" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow-teal)"/>
<path d="M 1470 612 L 1320 740 L 1320 876 L 1200 876 L 400 876" fill="none" stroke="#B45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
<rect x="1324" y="844" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="1338" y="864" font-size="14" font-weight="600" fill="#475569">thesis</text>
<line x1="1220" y1="860" x2="1246" y2="860" stroke="#1D4ED8" stroke-width="3" marker-end="url(#arrow-navy)"/>
<text x="1260" y="865" font-size="14" font-weight="600" fill="#475569">state replacement</text>
<line x1="1220" y1="882" x2="1246" y2="882" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow-teal)"/>
<text x="1260" y="887" font-size="14" font-weight="600" fill="#475569">attention compression</text>
<line x1="1220" y1="904" x2="1246" y2="904" stroke="#B45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
<text x="1260" y="909" font-size="14" font-weight="600" fill="#475569">paper thesis</text>
<text x="56" y="908" font-size="15" font-weight="500" fill="#475569">Observed evidence: model cards, serving papers, and product docs.</text>
<text x="56" y="930" font-size="15" font-weight="500" fill="#475569">The Linear-first end-state is a forward-looking synthesis rather than an announced industry consensus.</text>
</svg>
