<rect x="36" y="28" width="1528" height="924" rx="26" ry="26" fill="rgba(255,255,255,0.0)" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="56" y="70" font-size="32" font-weight="800" fill="#0F172A">Figure 4. From reusable state to a possible state-artifact economy</text>
<text x="56" y="102" font-size="18" font-weight="500" fill="#475569">What could become portable is not an arbitrary prompt, but a compatibility-checked state object with provenance and policy metadata</text>
<text x="110" y="166" font-size="16" font-weight="700" fill="#1D4ED8" letter-spacing="1.2">ARTIFACT LIFECYCLE</text>
<rect x="90" y="176" width="1420" height="440" rx="18" ry="18" fill="none" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="8 6"/>
<text x="110" y="640" font-size="16" font-weight="700" fill="#7C3AED" letter-spacing="1.2">WHAT REMAINS SPECULATIVE</text>
<rect x="90" y="650" width="1420" height="170" rx="18" ry="18" fill="none" stroke="#7C3AED" stroke-width="2" stroke-dasharray="8 6"/>
<rect x="130" y="248" width="270" height="200" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="131" y="249" width="268" height="8" rx="17" ry="17" fill="#1D4ED8"/>
<text x="158" y="284" text-anchor="start" font-size="20" font-weight="700" fill="#0F172A">Mint</text>
<text x="158" y="320" text-anchor="start" font-size="18" font-weight="500" fill="#475569">prefill or initialize</text>
<text x="158" y="346" text-anchor="start" font-size="18" font-weight="500" fill="#475569">a task-specific state</text>
<text x="158" y="372" text-anchor="start" font-size="18" font-weight="500" fill="#475569">bind model hash,</text>
<text x="158" y="398" text-anchor="start" font-size="18" font-weight="500" fill="#475569">tokenizer, tools,</text>
<text x="158" y="424" text-anchor="start" font-size="18" font-weight="500" fill="#475569">safety policy</text>
<rect x="470" y="220" width="320" height="256" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="471" y="221" width="318" height="8" rx="17" ry="17" fill="#B45309"/>
<text x="498" y="256" text-anchor="start" font-size="24" font-weight="700" fill="#0F172A">State artifact</text>
<text x="498" y="296" text-anchor="start" font-size="18" font-weight="500" fill="#475569">prefix / context</text>
<text x="498" y="322" text-anchor="start" font-size="18" font-weight="500" fill="#475569">fingerprint</text>
<text x="498" y="348" text-anchor="start" font-size="18" font-weight="500" fill="#475569">compatible model family</text>
<text x="498" y="374" text-anchor="start" font-size="18" font-weight="500" fill="#475569">task schema + persona tag</text>
<text x="498" y="400" text-anchor="start" font-size="18" font-weight="500" fill="#475569">active-horizon assumptions</text>
<text x="498" y="426" text-anchor="start" font-size="18" font-weight="500" fill="#475569">provenance + version</text>
<text x="498" y="452" text-anchor="start" font-size="18" font-weight="500" fill="#475569">history</text>
<rect x="860" y="220" width="260" height="110" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="861" y="221" width="258" height="8" rx="17" ry="17" fill="#0F766E"/>
<text x="888" y="256" text-anchor="start" font-size="20" font-weight="700" fill="#0F172A">Verify</text>
<text x="888" y="292" text-anchor="start" font-size="18" font-weight="500" fill="#475569">compatibility,</text>
<text x="888" y="318" text-anchor="start" font-size="18" font-weight="500" fill="#475569">provenance, safety</text>
<rect x="860" y="366" width="260" height="110" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="861" y="367" width="258" height="8" rx="17" ry="17" fill="#7C3AED"/>
<text x="888" y="402" text-anchor="start" font-size="20" font-weight="700" fill="#0F172A">Compose</text>
<text x="888" y="438" text-anchor="start" font-size="18" font-weight="500" fill="#475569">merge with workflow</text>
<text x="888" y="464" text-anchor="start" font-size="18" font-weight="500" fill="#475569">state or org memory</text>
<rect x="1180" y="220" width="260" height="110" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="1181" y="221" width="258" height="8" rx="17" ry="17" fill="#1D4ED8"/>
<text x="1208" y="256" text-anchor="start" font-size="20" font-weight="700" fill="#0F172A">Execute</text>
<text x="1208" y="292" text-anchor="start" font-size="18" font-weight="500" fill="#475569">resume agent loop</text>
<text x="1208" y="318" text-anchor="start" font-size="18" font-weight="500" fill="#475569">with tools and</text>
<text x="1208" y="344" text-anchor="start" font-size="18" font-weight="500" fill="#475569">retrieval</text>
<rect x="1180" y="366" width="260" height="110" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="1181" y="367" width="258" height="8" rx="17" ry="17" fill="#B45309"/>
<text x="1208" y="402" text-anchor="start" font-size="20" font-weight="700" fill="#0F172A">Settle</text>
<text x="1208" y="438" text-anchor="start" font-size="18" font-weight="500" fill="#475569">price usage, track</text>
<text x="1208" y="464" text-anchor="start" font-size="18" font-weight="500" fill="#475569">value, log outcomes</text>
<rect x="150" y="700" width="1320" height="86" rx="18" ry="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
<rect x="151" y="701" width="1318" height="8" rx="17" ry="17" fill="#BE123C"/>
<text x="810.0" y="736" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">Important caveat</text>
<text x="810.0" y="770" text-anchor="middle" font-size="15" font-weight="500" fill="#475569">This is an inference from serving constraints and memory-system design, not a current market standard.</text>
<path d="M 400 348 L 435 348 L 435 348 L 470 348" fill="none" stroke="#1D4ED8" stroke-width="3" marker-end="url(#arrow-navy)"/>
<rect x="439" y="316" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="453" y="336" font-size="14" font-weight="600" fill="#475569">create</text>
<path d="M 790 348 L 825 348 L 825 275 L 860 275" fill="none" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow-teal)"/>
<rect x="829" y="243" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="843" y="263" font-size="14" font-weight="600" fill="#475569">check</text>
