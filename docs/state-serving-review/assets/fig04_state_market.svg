<rect x="829" y="389" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="843" y="409" font-size="14" font-weight="600" fill="#475569">merge</text>
<path d="M 1120 275 L 1120 276 L 1160 276 L 1180 275" fill="none" stroke="#1D4ED8" stroke-width="3" marker-end="url(#arrow-navy)"/>
<rect x="1164" y="244" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="1178" y="264" font-size="14" font-weight="600" fill="#475569">load</text>
<path d="M 1120 421 L 1120 422 L 1160 422 L 1180 421" fill="none" stroke="#B45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
<rect x="1164" y="390" width="157" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="1178" y="410" font-size="14" font-weight="600" fill="#475569">price / account</text>
<path d="M 1440 275 L 1310 330 L 1310 366 L 1180 421" fill="none" stroke="#64748B" stroke-width="3" marker-end="url(#arrow-slate)"/>
<rect x="1314" y="334" width="121" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="1328" y="354" font-size="14" font-weight="600" fill="#475569">outcome log</text>
<line x1="1110" y1="860" x2="1136" y2="860" stroke="#1D4ED8" stroke-width="3" marker-end="url(#arrow-navy)"/>
<text x="1150" y="865" font-size="14" font-weight="600" fill="#475569">execution path</text>
<line x1="1110" y1="882" x2="1136" y2="882" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow-teal)"/>
<text x="1150" y="887" font-size="14" font-weight="600" fill="#475569">compatibility checks</text>
<line x1="1110" y1="904" x2="1136" y2="904" stroke="#B45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
<text x="1150" y="909" font-size="14" font-weight="600" fill="#475569">pricing / settlement</text>
<line x1="1110" y1="926" x2="1136" y2="926" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrow-violet)"/>
<text x="1150" y="931" font-size="14" font-weight="600" fill="#475569">composition</text>
<text x="56" y="908" font-size="15" font-weight="500" fill="#475569">The artifact metaphor becomes plausible only if memory is explicit, versioned, and cheap to reload relative to re-creating full context.</text>
</svg>
