<rect x="459" y="474" width="121" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="473" y="494" font-size="14" font-weight="600" fill="#475569">interactive</text>
<path d="M 410 584 L 455 584 L 455 506 L 500 506" fill="none" stroke="#B45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
<rect x="459" y="474" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="473" y="494" font-size="14" font-weight="600" fill="#475569">scale</text>
<path d="M 410 740 L 455 740 L 455 506 L 500 506" fill="none" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrow-violet)"/>
<rect x="459" y="474" width="120" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="473" y="494" font-size="14" font-weight="600" fill="#475569">tool use</text>
<path d="M 920 506 L 940 506 L 980 506 L 980 506 L 1010 506 L 1010 506" fill="none" stroke="#BE123C" stroke-width="3" marker-end="url(#arrow-rose)"/>
<rect x="984" y="474" width="157" height="30" rx="12" ry="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="998" y="494" font-size="14" font-weight="600" fill="#475569">missing metrics</text>
<line x1="1070" y1="860" x2="1096" y2="860" stroke="#1D4ED8" stroke-width="3" marker-end="url(#arrow-navy)"/>
<text x="1110" y="865" font-size="14" font-weight="600" fill="#475569">conversational memory</text>
<line x1="1070" y1="882" x2="1096" y2="882" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow-teal)"/>
<text x="1110" y="887" font-size="14" font-weight="600" fill="#475569">interactive memory</text>
<line x1="1070" y1="904" x2="1096" y2="904" stroke="#B45309" stroke-width="3" marker-end="url(#arrow-amber)"/>
<text x="1110" y="909" font-size="14" font-weight="600" fill="#475569">ultra-long history</text>
<line x1="1070" y1="926" x2="1096" y2="926" stroke="#7C3AED" stroke-width="3" marker-end="url(#arrow-violet)"/>
<text x="1110" y="931" font-size="14" font-weight="600" fill="#475569">tool use</text>
<line x1="1070" y1="948" x2="1096" y2="948" stroke="#BE123C" stroke-width="3" marker-end="url(#arrow-rose)"/>
<text x="1110" y="953" font-size="14" font-weight="600" fill="#475569">missing metrics</text>
<text x="56" y="908" font-size="15" font-weight="500" fill="#475569">A state-centric system should be judged by what survives the next service window, not only by what fits inside the current one.</text>
</svg>
